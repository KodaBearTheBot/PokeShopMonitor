name: Check shops for new products

on:
  schedule:
    # Every 15 minutes. GitHub may delay this slightly under load, that's normal.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # lets you trigger a manual test run from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit the updated state file

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run checker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_shops.py

      - name: Commit updated state
        run: |
          git config user.name "shop-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          git diff --staged --quiet || git commit -m "Update product state [skip ci]"
          git push
